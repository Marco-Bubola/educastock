<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="educastock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>educastock</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Passo 1: carrega ZBar WASM + polyfill BarcodeDetector como scripts síncronos.
    A ordem importa: zbar-wasm ANTES do polyfill.
    Após execução, `window.barcodeDetectorPolyfill.BarcodeDetectorPolyfill` está disponível.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.9.15/dist/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js"></script>

  <script>
    async function _bootstrapApp() {

      // ── 1. Instala BarcodeDetector se necessário ───────────────────────────
      if (!('BarcodeDetector' in window)) {
        try {
          // Polyfill já foi carregado pelos <script> acima.
          // A variável global é 'barcodeDetectorPolyfill' com a classe dentro.
          var BDP = (typeof barcodeDetectorPolyfill !== 'undefined')
            ? (barcodeDetectorPolyfill.BarcodeDetectorPolyfill || barcodeDetectorPolyfill.BarcodeDetector)
            : null;
          if (BDP) {
            window.BarcodeDetector = BDP;
            console.log('[EducaStock] BarcodeDetectorPolyfill instalado ✅');
          } else {
            console.error('[EducaStock] barcodeDetectorPolyfill global não encontrado');
          }
        } catch (e) {
          console.error('[EducaStock] Erro instalando polyfill:', e);
        }
      } else {
        console.log('[EducaStock] BarcodeDetector nativo disponível ✅');
      }

      // ── 2. Cria instância do detector ──────────────────────────────────────
      try {
        window._barcodeDetector = new window.BarcodeDetector({
          formats: [
            'ean_13', 'ean_8', 'code_128', 'qr_code',
            'upc_a', 'upc_e', 'code_39', 'code_93', 'itf'
          ]
        });
        console.log('[EducaStock] _barcodeDetector criado ✅');
      } catch (e) {
        console.error('[EducaStock] _barcodeDetector init falhou:', e);
        window._barcodeDetector = null;
      }

      // ── 3. Helpers ─────────────────────────────────────────────────────────

      // Diagnóstico síncrono do stream (retorna JSON string)
      window._getStreamDiagnostics = function() {
        try {
          var video = document.querySelector('video');
          if (!video) return '{"err":"no-video"}';
          var tracks = video.srcObject ? video.srcObject.getVideoTracks() : [];
          return JSON.stringify({
            rs: video.readyState,
            w: video.videoWidth,
            h: video.videoHeight,
            paused: video.paused,
            stream: !!video.srcObject,
            tracks: tracks.length,
            tState: tracks.length > 0 ? tracks[0].readyState : 'none',
            IC: ('ImageCapture' in window),
            det: !!window._barcodeDetector
          });
        } catch(e) { return '{"err":"' + String(e.message || e) + '"}'; }
      };

      // Obtém (ou cria) instância de ImageCapture para o track ativo
      window._ic = null; window._icTrack = null;
      window._getImageCapture = function() {
        try {
          var video = document.querySelector('video');
          if (!video || !video.srcObject) return null;
          var tracks = video.srcObject.getVideoTracks();
          if (!tracks || !tracks.length) return null;
          var track = tracks[0];
          if (!('ImageCapture' in window)) return null;
          if (!window._ic || window._icTrack !== track || track.readyState !== 'live') {
            window._ic = new ImageCapture(track);
            window._icTrack = track;
          }
          return window._ic;
        } catch(e) { return null; }
      };

      // ── 4. Detecta barcode em blob/file via img+canvas ─────────────────────
      window._detectInBlob = function(blob, callback) {
        if (!window._barcodeDetector) { callback(null); return; }
        var url = URL.createObjectURL(blob);
        var img = new Image();
        img.onload = function() {
          URL.revokeObjectURL(url);
          var w = img.naturalWidth || img.width;
          var h = img.naturalHeight || img.height;
          if (!w || !h) { callback(null); return; }

          // Tenta detect direto no img (sem canvas — mais rápido)
          window._barcodeDetector.detect(img).then(function(r) {
            if (r && r.length > 0) { callback(r[0].rawValue); return; }

            // Canvas em resolução original
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0);
            window._barcodeDetector.detect(canvas).then(function(r2) {
              if (r2 && r2.length > 0) { callback(r2[0].rawValue); return; }

              // Canvas reduzido (máx 1920px) para fotos muito grandes
              var scale = Math.min(1, 1920 / Math.max(w, h));
              if (scale < 0.99) {
                var sw = Math.round(w * scale), sh = Math.round(h * scale);
                var small = document.createElement('canvas');
                small.width = sw; small.height = sh;
                small.getContext('2d').drawImage(canvas, 0, 0, sw, sh);
                window._barcodeDetector.detect(small).then(function(r3) {
                  callback(r3 && r3.length > 0 ? r3[0].rawValue : null);
                }, function() { callback(null); });
              } else {
                callback(null);
              }
            }, function() { callback(null); });
          }, function() { callback(null); });
        };
        img.onerror = function() { URL.revokeObjectURL(url); callback(null); };
        img.src = url;
      };

      // ── 5. Scan de frame de vídeo (loop contínuo) ─────────────────────────
      // Chamado via callback (cb) — evita promiseToFuture no Dart.
      // Prioriza grabFrame() que não tem restrição de canvas no iOS WebKit.
      window._scanCanvas = null;
      window._zxingScanFrameCb = function(cb) {
        if (!window._barcodeDetector) { cb(null); return; }
        var video = document.querySelector('video');
        if (!video || video.readyState < 2) { cb(null); return; }
        var vw = video.videoWidth, vh = video.videoHeight;
        if (!vw || !vh) { cb(null); return; }

        function tryCanvas() {
          // Estratégia 3: canvas (pode retornar preto no iOS, mas tenta)
          try {
            if (!window._scanCanvas) window._scanCanvas = document.createElement('canvas');
            var c = window._scanCanvas;
            if (c.width !== vw || c.height !== vh) { c.width = vw; c.height = vh; }
            c.getContext('2d', { willReadFrequently: true }).drawImage(video, 0, 0, vw, vh);
            window._barcodeDetector.detect(c).then(
              function(r) { cb(r && r.length > 0 ? r[0].rawValue : null); },
              function() { cb(null); }
            );
          } catch(e) { cb(null); }
        }

        function tryDirectVideo() {
          // Estratégia 2: detect() direto no elemento <video>
          window._barcodeDetector.detect(video).then(function(r) {
            if (r && r.length > 0) { cb(r[0].rawValue); return; }
            tryCanvas();
          }, function() { tryCanvas(); });
        }

        // Estratégia 1: ImageCapture.grabFrame() — contorna restrição iOS
        var ic = window._getImageCapture();
        if (ic) {
          ic.grabFrame().then(function(frame) {
            if (!frame) { tryDirectVideo(); return; }
            window._barcodeDetector.detect(frame).then(function(r) {
              if (frame.close) frame.close();
              if (r && r.length > 0) { cb(r[0].rawValue); return; }
              tryDirectVideo();
            }, function() {
              if (frame && frame.close) frame.close();
              tryDirectVideo();
            });
          }, function() { tryDirectVideo(); });
        } else {
          tryDirectVideo();
        }
      };

      // ── 6. Captura foto e detecta (botão "Tirar foto") ────────────────────
      // Chamado via callback (cb). Tenta ImageCapture.takePhoto() primeiro;
      // se falhar, abre <input type=file capture=environment> como fallback.
      window._captureAndScanCb = function(cb) {
        if (!window._barcodeDetector) { cb('ERR:no_detector'); return; }

        var ic = window._getImageCapture();

        function fileInputFallback() {
          // Fallback: abre câmera nativa para tirar foto
          var input = document.createElement('input');
          input.type = 'file'; input.accept = 'image/*';
          input.setAttribute('capture', 'environment');
          input.style.cssText = 'position:absolute;top:-9999px;left:-9999px;opacity:0;';
          var settled = false;
          function done(v) {
            if (settled) return; settled = true;
            document.removeEventListener('visibilitychange', onVis);
            try { if (document.body.contains(input)) document.body.removeChild(input); } catch(_) {}
            cb(v);
          }
          input.addEventListener('change', function() {
            var file = input.files && input.files[0];
            if (!file) { done(null); return; }
            window._detectInBlob(file, done);
          });
          var wasHidden = false;
          function onVis() {
            if (document.hidden) { wasHidden = true; }
            else if (wasHidden) { setTimeout(function() { done(null); }, 2000); }
          }
          document.addEventListener('visibilitychange', onVis);
          document.body.appendChild(input);
          input.click();
        }

        if (!ic) { fileInputFallback(); return; }

        // Tenta takePhoto() — captura do stream atual sem abrir câmera nativa
        ic.takePhoto().then(function(blob) {
          window._detectInBlob(blob, cb);
        }, function(err) {
          console.warn('[EducaStock] takePhoto falhou:', err && err.message ? err.message : err);
          // Tenta grabFrame como segundo recurso antes do fallback nativo
          ic.grabFrame().then(function(frame) {
            if (!frame) { fileInputFallback(); return; }
            window._barcodeDetector.detect(frame).then(function(r) {
              if (frame.close) frame.close();
              if (r && r.length > 0) { cb(r[0].rawValue); return; }
              fileInputFallback();
            }, function() {
              if (frame && frame.close) frame.close();
              fileInputFallback();
            });
          }, function() { fileInputFallback(); });
        });
      };

      // ── 7. Carrega Flutter SOMENTE após tudo pronto ────────────────────────
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      document.body.appendChild(s);
    }
    _bootstrapApp();
  </script>
</body>
</html>
