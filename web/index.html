<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="educastock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>educastock</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Carrega o polyfill BarcodeDetector (iOS Safari não suporta nativamente)
    ANTES de iniciar o Flutter, usando async/await para garantir a ordem.
    O flutter_bootstrap.js é inserido dinamicamente APÓS o polyfill estar pronto.
  -->
  <script>
    async function _bootstrapApp() {
      // 1. Garante BarcodeDetector (polyfill para iOS Safari / Chrome iOS)
      if (!('BarcodeDetector' in window)) {
        try {
          const mod = await import(
            'https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js'
          );
          window['BarcodeDetector'] = mod.BarcodeDetector;
          console.log('[EducaStock] BarcodeDetector polyfill instalado (jsDelivr) ✅');
        } catch (e) {
          console.warn('[EducaStock] jsDelivr falhou, tentando unpkg...', e);
          try {
            const mod = await import(
              'https://unpkg.com/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js'
            );
            window['BarcodeDetector'] = mod.BarcodeDetector;
            console.log('[EducaStock] BarcodeDetector polyfill instalado (unpkg) ✅');
          } catch (e2) {
            console.error('[EducaStock] Falha ao carregar polyfill BarcodeDetector:', e2);
          }
        }
      } else {
        console.log('[EducaStock] BarcodeDetector nativo disponível ✅');
      }

      // 2. Inicializa instância do BarcodeDetector para uso direto via Dart
      try {
        window._barcodeDetector = new window['BarcodeDetector']({
          formats: [
            'ean_13', 'ean_8', 'code_128', 'qr_code',
            'upc_a', 'upc_e', 'code_39', 'code_93', 'itf'
          ]
        });
        console.log('[EducaStock] _barcodeDetector pronto ✅');
      } catch (e) {
        console.warn('[EducaStock] _barcodeDetector init falhou:', e);
        window._barcodeDetector = null;
      }

      // 3. Expõe funções de scan de código de barras para o Dart via js_util
      //    (Retornam Promise<String|null> — Dart usa promiseToFuture())

      // ── Helper: ImageCapture (API nativa iOS 15.4+ / Chrome 59+) ─────────
      // Permite capturar frames e fotos diretamente do MediaStreamTrack,
      // contornando a restrição do iOS WebKit que impede leitura de canvas.
      window._ic = null;
      window._icTrack = null;
      window._getImageCapture = function() {
        try {
          var video = document.querySelector('video');
          if (!video || !video.srcObject) return null;
          var tracks = video.srcObject.getVideoTracks();
          if (!tracks || !tracks.length) return null;
          var track = tracks[0];
          if (!('ImageCapture' in window)) return null;
          if (!window._ic || window._icTrack !== track || track.readyState !== 'live') {
            window._ic = new ImageCapture(track);
            window._icTrack = track;
          }
          return window._ic;
        } catch(e) { return null; }
      };

      // ── Diagnóstico do stream (chamada síncrona, retorna string JSON) ─────
      window._getStreamDiagnostics = function() {
        try {
          var video = document.querySelector('video');
          if (!video) return '{"err":"no-video"}';
          var tracks = video.srcObject ? video.srcObject.getVideoTracks() : [];
          return JSON.stringify({
            rs: video.readyState,
            w: video.videoWidth,
            h: video.videoHeight,
            paused: video.paused,
            stream: !!video.srcObject,
            tracks: tracks.length,
            tState: tracks.length > 0 ? tracks[0].readyState : 'none',
            IC: ('ImageCapture' in window),
            det: !!window._barcodeDetector
          });
        } catch(e) { return '{"err":"' + String(e.message || e) + '"}'; }
      };

      // ── Scan contínuo do frame de vídeo (loop 800ms) ──────────────────────
      // Prioriza ImageCapture.grabFrame() que funciona no iOS sem restrição de canvas.
      window._scanCanvas = null;
      window._zxingScanFrame = async function() {
        if (!window._barcodeDetector) return null;
        var video = document.querySelector('video');
        if (!video || video.readyState < 2) return null;
        var vw = video.videoWidth, vh = video.videoHeight;
        if (!vw || !vh) return null;

        // Estratégia 1: ImageCapture.grabFrame() — contorna restrição de canvas iOS
        var ic = window._getImageCapture();
        if (ic) {
          try {
            var frame = await ic.grabFrame();
            if (frame) {
              try {
                var r = await window._barcodeDetector.detect(frame);
                if (frame.close) frame.close();
                if (r && r.length > 0) return r[0].rawValue;
              } catch(e) { if (frame && frame.close) frame.close(); }
            }
          } catch(e) { /* grabFrame indisponível neste browser */ }
        }

        // Estratégia 2: detect() direto no elemento <video>
        try {
          var r2 = await window._barcodeDetector.detect(video);
          if (r2 && r2.length > 0) return r2[0].rawValue;
        } catch(_) {}

        // Estratégia 3: canvas (pode ser branco no iOS, mas vale tentar)
        try {
          if (!window._scanCanvas) window._scanCanvas = document.createElement('canvas');
          var c = window._scanCanvas;
          if (c.width !== vw || c.height !== vh) { c.width = vw; c.height = vh; }
          c.getContext('2d', { willReadFrequently: true }).drawImage(video, 0, 0, vw, vh);
          var r3 = await window._barcodeDetector.detect(c);
          if (r3 && r3.length > 0) return r3[0].rawValue;
        } catch(_) {}

        return null;
      };

      // ── Captura foto do stream atual e detecta (botão "Tirar foto") ───────
      // Usa ImageCapture.takePhoto() para capturar foto de alta resolução
      // SEM abrir a câmera nativa do iOS. Processa a imagem com BarcodeDetector.
      window._captureAndScan = async function() {
        if (!window._barcodeDetector) return 'ERR:no_detector';
        var ic = window._getImageCapture();
        if (!ic) return 'ERR:no_stream';

        var blob;
        // 1. Tenta takePhoto() (alta resolução, melhor para detectar código)
        try {
          blob = await ic.takePhoto();
        } catch(e) {
          // takePhoto falhou — tenta grabFrame como fallback
          console.warn('[EducaStock] takePhoto error:', e && e.message ? e.message : e);
          try {
            var frame = await ic.grabFrame();
            if (frame) {
              var r = await window._barcodeDetector.detect(frame);
              if (frame.close) frame.close();
              if (r && r.length > 0) return r[0].rawValue;
            }
          } catch(e2) {}
          return 'ERR:capture_failed';
        }

        // 2. Processa o blob da foto: img → canvas → detect
        return await new Promise(function(resolve) {
          var url = URL.createObjectURL(blob);
          var img = new Image();
          img.onload = async function() {
            URL.revokeObjectURL(url);
            var w = img.naturalWidth || img.width;
            var h = img.naturalHeight || img.height;

            // Tenta detect direto no elemento img
            try {
              var r = await window._barcodeDetector.detect(img);
              if (r && r.length > 0) { resolve(r[0].rawValue); return; }
            } catch(_) {}

            // Canvas em resolução original
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0);
            try {
              var r2 = await window._barcodeDetector.detect(canvas);
              if (r2 && r2.length > 0) { resolve(r2[0].rawValue); return; }
            } catch(_) {}

            // Canvas reduzido a max 1920px (fotos muito grandes podem atrasar)
            var scale = Math.min(1, 1920 / Math.max(w, h));
            if (scale < 0.99) {
              var sw = Math.round(w * scale), sh = Math.round(h * scale);
              var small = document.createElement('canvas');
              small.width = sw; small.height = sh;
              small.getContext('2d').drawImage(canvas, 0, 0, sw, sh);
              try {
                var r3 = await window._barcodeDetector.detect(small);
                if (r3 && r3.length > 0) { resolve(r3[0].rawValue); return; }
              } catch(_) {}
            }
            resolve(null);
          };
          img.onerror = function() { URL.revokeObjectURL(url); resolve(null); };
          img.src = url;
        });
      };

      // 4. Carrega Flutter SOMENTE após tudo estar pronto
      const s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      document.body.appendChild(s);
    }
    _bootstrapApp();
  </script>
</body>
</html>
