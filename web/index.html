<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="educastock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>educastock</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Carrega o polyfill BarcodeDetector (iOS Safari não suporta nativamente)
    ANTES de iniciar o Flutter, usando async/await para garantir a ordem.
    O flutter_bootstrap.js é inserido dinamicamente APÓS o polyfill estar pronto.
  -->
  <script>
    async function _bootstrapApp() {
      // 1. Garante BarcodeDetector (polyfill para iOS Safari / Chrome iOS)
      if (!('BarcodeDetector' in window)) {
        try {
          const mod = await import(
            'https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js'
          );
          window['BarcodeDetector'] = mod.BarcodeDetector;
          console.log('[EducaStock] BarcodeDetector polyfill instalado (jsDelivr) ✅');
        } catch (e) {
          console.warn('[EducaStock] jsDelivr falhou, tentando unpkg...', e);
          try {
            const mod = await import(
              'https://unpkg.com/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js'
            );
            window['BarcodeDetector'] = mod.BarcodeDetector;
            console.log('[EducaStock] BarcodeDetector polyfill instalado (unpkg) ✅');
          } catch (e2) {
            console.error('[EducaStock] Falha ao carregar polyfill BarcodeDetector:', e2);
          }
        }
      } else {
        console.log('[EducaStock] BarcodeDetector nativo disponível ✅');
      }

      // 2. Inicializa instância do BarcodeDetector para uso direto via Dart
      try {
        window._barcodeDetector = new window['BarcodeDetector']({
          formats: [
            'ean_13', 'ean_8', 'code_128', 'qr_code',
            'upc_a', 'upc_e', 'code_39', 'code_93', 'itf'
          ]
        });
        console.log('[EducaStock] _barcodeDetector pronto ✅');
      } catch (e) {
        console.warn('[EducaStock] _barcodeDetector init falhou:', e);
        window._barcodeDetector = null;
      }

      // 3. Expõe função de scan de frame para o Dart via js_util
      //    Retorna Promise<String|null> — Dart usa promiseToFuture()
      //
      //    IMPORTANTE: iOS Chrome/Safari não permite detect() diretamente em
      //    <video>. É necessário capturar o frame via canvas antes — caso
      //    contrário o polyfill ZXing retorna vazio silenciosamente.
      window._scanCanvas = null; // canvas reutilizado para evitar GC excessivo
      window._zxingScanFrame = async function() {
        if (!window._barcodeDetector) return null;
        // Pega o elemento <video> criado pelo mobile_scanner
        const video = document.querySelector('video');
        if (!video || video.readyState < 2 || !video.videoWidth) return null;
        try {
          // Captura frame atual para canvas (corrige bloqueio de leitura de
          // vídeo no iOS WebKit / Chrome iOS)
          if (!window._scanCanvas) {
            window._scanCanvas = document.createElement('canvas');
          }
          const c = window._scanCanvas;
          const vw = video.videoWidth;
          const vh = video.videoHeight;
          if (c.width !== vw || c.height !== vh) {
            c.width = vw;
            c.height = vh;
          }
          const ctx = c.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(video, 0, 0, vw, vh);
          const results = await window._barcodeDetector.detect(c);
          if (results && results.length > 0) {
            return results[0].rawValue;
          }
          return null;
        } catch (e) {
          console.warn('[EducaStock] ZXing detect error:', e && e.message ? e.message : e);
          return null;
        }
      };

      // 4. Carrega Flutter SOMENTE após tudo estar pronto
      const s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      document.body.appendChild(s);
    }
    _bootstrapApp();
  </script>
</body>
</html>
