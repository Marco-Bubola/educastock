<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="educastock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>educastock</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Carrega o polyfill BarcodeDetector (iOS Safari não suporta nativamente)
    ANTES de iniciar o Flutter, usando async/await para garantir a ordem.
    O flutter_bootstrap.js é inserido dinamicamente APÓS o polyfill estar pronto.
  -->
  <script>
    async function _bootstrapApp() {
      if (!('BarcodeDetector' in window)) {
        try {
          const mod = await import(
            'https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js'
          );
          window['BarcodeDetector'] = mod.BarcodeDetector;
          console.log('[EducaStock] BarcodeDetector polyfill instalado ✅');
        } catch (e) {
          console.warn('[EducaStock] Falha ao carregar polyfill BarcodeDetector:', e);
        }
      } else {
        console.log('[EducaStock] BarcodeDetector nativo disponível ✅');
      }
      // Carrega Flutter SOMENTE após o polyfill estar pronto
      const s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      document.body.appendChild(s);
    }
    _bootstrapApp();
  </script>
</body>
</html>
