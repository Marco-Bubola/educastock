name: CI

on:
  push:
    branches: [main, develop, homolog]
  pull_request:
    branches: [main, develop, homolog]

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub lib

      - name: Test
        run: flutter test --no-pub

      - name: Build Web (DEV)
        run: flutter build web --release --dart-define=APP_ENV=dev

      - name: Build APK (DEV)
        run: flutter build apk --release --dart-define=APP_ENV=dev

  functions-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build
